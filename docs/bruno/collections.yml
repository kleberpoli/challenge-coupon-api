opencollection: 1.0.0
info:
  name: Challenge (Coupon API)
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: DEV
      variables:
        - name: baseUrl
          value: http://localhost:8080/
items:
  - info:
      name: createCoupon
      type: http
      seq: 1
    http:
      method: POST
      url: '{{baseUrl}}coupons'
      body:
        type: json
        data: |-
          {
            "code": "SAVE10",
            "description": "Discount coupon for first-time users, offering a limited-time promotion on selected products",
            "discountValue": 10.0,
            "expirationDate": "2026-04-02T08:11:15.609Z",
            "published": true
          }
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: deleteCoupon
      type: http
      seq: 4
    http:
      method: DELETE
      url: '{{baseUrl}}coupons/b4e4f918-8440-4a12-89e5-da67531ac44e'
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: getCouponByCode
      type: http
      seq: 3
    http:
      method: GET
      url: '{{baseUrl}}coupons/code/SAVE10'
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: getCouponById
      type: http
      seq: 2
    http:
      method: GET
      url: '{{baseUrl}}coupons/b4e4f918-8440-4a12-89e5-da67531ac44e'
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-04-01T23:58:04.155Z'
    exportedUsing: Bruno
