# --- H2 Database Configuration for Testing (In-Memory) ---
# Using an in-memory DB ensures tests are isolated and don't require file system permissions.
# DB_CLOSE_DELAY=-1 keeps the schema alive while the test context is running.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY,VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate strategy for tests: always drop and recreate the schema
spring.jpa.hibernate.ddl-auto=create-drop