# Application metadata
spring.application.name=couponapi


# --- H2 Database Configuration (Persistent File-based) ---
# Persistent URL: creates the database in the '/data' folder within the project root
# DB_CLOSE_DELAY=-1: keeps the database alive as long as the JVM is running
# NON_KEYWORDS: avoids syntax errors with reserved SQL words (e.g., 'KEY', 'VALUE')
spring.datasource.url=jdbc:h2:file:./data/coupondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=KEY,VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password


# --- JPA / Hibernate Configuration ---

# Enables SQL logging in the console
spring.jpa.show-sql=false

# Formats the logged SQL for better readability (Clean Code for logs)
spring.jpa.properties.hibernate.format_sql=true

# Disables Open Session In View (OSIV) for better performance and connection management
spring.jpa.open-in-view=false

# DDL Strategy: 'update' creates the schema on the first boot and preserves data on subsequent restarts
# In production or if using Flyway (recommended), use 'validate' or 'none'
spring.jpa.hibernate.ddl-auto=update


# --- H2 Web Console Configuration ---

# Enables the browser-based database management interface at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allows access from outside the container
spring.h2.console.settings.web-allow-others=true

# To avoid problems with coupon expiration dates
spring.jackson.time-zone=UTC
spring.jackson.deserialization.fail-on-unknown-properties=false

# Required to allow H2 Console to render inside an <iframe> if Spring Security is present
#spring.h2.console.settings.web-allow-others=false